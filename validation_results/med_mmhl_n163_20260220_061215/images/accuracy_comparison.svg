<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .bar-label { font-family: Arial, sans-serif; font-size: 14px; }
      .value { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: white; }
      .gain { font-family: Arial, sans-serif; font-size: 13px; fill: #2A9D8F; font-weight: bold; }
      .yaxis { font-family: Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>
  
  <rect width="700" height="500" fill="#f8f9fa"/>
  
  <text x="350" y="35" text-anchor="middle" class="title">Accuracy Improvement Through Optimization</text>
  
  <!-- Y-axis -->
  <line x1="80" y1="80" x2="80" y2="400" stroke="#333" stroke-width="2"/>
  <text x="30" y="240" text-anchor="middle" class="yaxis" transform="rotate(-90 30 240)">Accuracy (%)</text>
  
  <!-- Y-axis ticks -->
  <text x="70" y="405" text-anchor="end" class="yaxis">0%</text>
  <text x="70" y="325" text-anchor="end" class="yaxis">20%</text>
  <text x="70" y="245" text-anchor="end" class="yaxis">40%</text>
  <text x="70" y="165" text-anchor="end" class="yaxis">60%</text>
  <text x="70" y="85" text-anchor="end" class="yaxis">80%</text>
  <text x="70" y="65" text-anchor="end" class="yaxis">100%</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="325" x2="650" y2="325" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="245" x2="650" y2="245" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="165" x2="650" y2="165" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="85" x2="650" y2="85" stroke="#ddd" stroke-width="1"/>
  
  <!-- Baseline threshold line at 50% -->
  <line x1="80" y1="240" x2="650" y2="240" stroke="#E63946" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="660" y="245" class="yaxis" fill="#E63946">Default threshold (0.5)</text>
  
  <!-- Bars -->
  <!-- Veracity: 71.2% -->
  <rect x="120" y="171" width="100" height="229" fill="#E63946" stroke="#333" stroke-width="2"/>
  <text x="170" y="250" text-anchor="middle" class="value">71.2%</text>
  <text x="170" y="430" text-anchor="middle" class="bar-label">Veracity</text>
  <text x="170" y="448" text-anchor="middle" class="bar-label" font-size="11">(default 0.5)</text>
  
  <!-- Alignment: 77.9% -->
  <rect x="260" y="155" width="100" height="245" fill="#F4A261" stroke="#333" stroke-width="2"/>
  <text x="310" y="250" text-anchor="middle" class="value">77.9%</text>
  <text x="310" y="430" text-anchor="middle" class="bar-label">Alignment</text>
  <text x="310" y="448" text-anchor="middle" class="bar-label" font-size="11">(default 0.5)</text>
  
  <!-- Simple combination (no optimization): estimate ~80% -->
  <rect x="400" y="160" width="100" height="240" fill="#6C757D" stroke="#333" stroke-width="2"/>
  <text x="450" y="250" text-anchor="middle" class="value" fill="white">~80%</text>
  <text x="450" y="430" text-anchor="middle" class="bar-label">Simple OR</text>
  <text x="450" y="448" text-anchor="middle" class="bar-label" font-size="11">(no optimization)</text>
  
  <!-- Optimized: 91.4% -->
  <rect x="540" y="91" width="100" height="309" fill="#2A9D8F" stroke="#333" stroke-width="2"/>
  <text x="590" y="250" text-anchor="middle" class="value">91.4%</text>
  <text x="590" y="430" text-anchor="middle" class="bar-label">Optimized</text>
  <text x="590" y="448" text-anchor="middle" class="bar-label" font-size="11">(thresholds 0.65/0.30)</text>
  
  <!-- Gain arrows -->
  <line x1="170" y1="160" x2="590" y2="80" stroke="#2A9D8F" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="450" y="100" class="gain">+20.2% gain</text>
  
  <line x1="310" y1="145" x2="590" y2="80" stroke="#2A9D8F" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="480" y="115" class="gain">+13.5% gain</text>
</svg>