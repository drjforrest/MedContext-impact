<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 14px; }
      .value { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: white; }
      .yaxis { font-family: Arial, sans-serif; font-size: 12px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="title">Signal Ablation: Individual vs Combined</text>
  
  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="320" stroke="#333" stroke-width="2"/>
  <text x="40" y="190" text-anchor="middle" class="label" transform="rotate(-90 40 190)">Accuracy (%)</text>
  
  <!-- Y-axis ticks -->
  <text x="70" y="320" text-anchor="end" class="yaxis">0%</text>
  <text x="70" y="260" text-anchor="end" class="yaxis">20%</text>
  <text x="70" y="200" text-anchor="end" class="yaxis">40%</text>
  <text x="70" y="140" text-anchor="end" class="yaxis">60%</text>
  <text x="70" y="80" text-anchor="end" class="yaxis">80%</text>
  <text x="70" y="65" text-anchor="end" class="yaxis">100%</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="260" x2="550" y2="260" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="200" x2="550" y2="200" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="140" x2="550" y2="140" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="80" x2="550" y2="80" stroke="#ddd" stroke-width="1"/>
  
  <!-- Bars -->
  <!-- Veracity: 71.2% -->
  <rect x="120" y="131" width="120" height="189" fill="#E63946" stroke="#333" stroke-width="2"/>
  <text x="180" y="240" text-anchor="middle" class="value">71.2%</text>
  <text x="180" y="350" text-anchor="middle" class="label">Veracity</text>
  <text x="180" y="370" text-anchor="middle" class="label" font-size="12">(Alone)</text>
  
  <!-- Alignment: 77.9% -->
  <rect x="280" y="115" width="120" height="205" fill="#F4A261" stroke="#333" stroke-width="2"/>
  <text x="340" y="240" text-anchor="middle" class="value">77.9%</text>
  <text x="340" y="350" text-anchor="middle" class="label">Alignment</text>
  <text x="340" y="370" text-anchor="middle" class="label" font-size="12">(Alone)</text>
  
  <!-- Combined: 91.4% -->
  <rect x="440" y="87" width="120" height="233" fill="#2A9D8F" stroke="#333" stroke-width="2"/>
  <text x="500" y="240" text-anchor="middle" class="value">91.4%</text>
  <text x="500" y="350" text-anchor="middle" class="label">Combined</text>
  <text x="500" y="370" text-anchor="middle" class="label" font-size="12">(Contextual)</text>
</svg>