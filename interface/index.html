<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedContext Debug Console</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MedContext Debug Console</h1>
        <p>Observability-first interface for agentic workflows.</p>
      </header>

      <section class="panel">
        <h2>Connection</h2>
        <div class="grid">
          <label>
            API Base URL
            <input id="apiBase" type="text" value="http://localhost:8000" />
          </label>
          <label>
            Image ID (optional)
            <input id="imageId" type="text" placeholder="uuid or custom id" />
          </label>
        </div>
      </section>

      <section class="panel">
        <h2>Upload</h2>
        <div class="grid">
          <label>
            Image File
            <input id="fileInput" type="file" accept="image/*" />
          </label>
          <label>
            Context (optional)
            <input
              id="contextInput"
              type="text"
              placeholder="caption or claim context"
            />
          </label>
        </div>
        <div class="actions">
          <button id="btnRun">Run Orchestrator</button>
          <button id="btnRunLangGraph">Run LangGraph</button>
          <button id="btnTrace">Run Trace</button>
          <button id="btnGraph">Show Graph</button>
        </div>
      </section>

      <section class="panel">
        <h2>Trace</h2>
        <div id="traceSummary" class="muted">No trace yet.</div>
        <table id="traceTable">
          <thead>
            <tr>
              <th>Node</th>
              <th>Timestamp</th>
              <th>Duration (ms)</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Mermaid Graph</h2>
        <div id="graphContainer" class="graph"></div>
      </section>

      <section class="panel">
        <h2>Raw Response</h2>
        <pre id="output" class="output"></pre>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
